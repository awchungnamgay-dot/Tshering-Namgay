<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - DrukHotel Guide</title>
    <style>
        body {
            font-family: Arial, sans-serif; 
            margin: 0; 
            text-align: center; 
        }

        /* Navbar */
        header {
            background-color: #4a6fa5;
            color: white;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: Arial;
        }

        header h2 {
            margin: 0;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Map Banner Image - INCREASED HEIGHT HERE */
        .map-container {
            width: 100%;
            height: 550px; /* Changed from 350px to 550px */
            overflow: hidden;
        }

        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* Contact Section */
        .contact-section {
             display: flex; 
             justify-content: center;
             gap: 100px;
             padding: 60px 20px;
             text-align: left;
             max-width: 1000px;
             margin: 0 auto;
        }

        .contact-info, .contact-form {
            flex: 1;
        }

        h2 {
            color: #333;
            margin-top: 0;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px; 
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        .btn-submit {
            background: #b08d57;
            color: white; 
            border: none;
            padding: 12px 45px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-submit:hover {
            background: #8e7146;
        }

        p {
            line-height: 1.6;
            color: #555;
        }
    </style>
</head>
<body>

<header>
    <h2>DrukHotel Guide</h2>
    <nav>
        <a href="Profile.html">My Profile</a>
        <a href="Homepage.html">Home</a>
        <a href="Hotelpage.html">Hotels</a>
        <a href="Destination.html">Destinations</a>
        <a href="Culture.html">Culture</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="map-container">
    <img src="https://wallpapercave.com/wp/wp4205340.jpg" alt="flag">
</div>

<div class="contact-section">
    <div class="contact-info">
        <h2>CONTACT INFO</h2>
        <p><strong>📍 Address:</strong><br> 23 M. Main Street,<br> Thimphu, Bhutan 11001</p>
        <p><strong>✉️ Email:</strong><br> drukhotel@gmail.com</p>
        <p><strong>📞 Phone:</strong><br> +975 17 639 778</p>
    </div>

    <div class="contact-form">
        <h2>CONTACT US</h2>
        <form>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="btn-submit">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
